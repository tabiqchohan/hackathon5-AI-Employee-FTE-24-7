# FlowSync Customer Success AI Agent -- Secrets (TEMPLATE)
# =========================================================
# ⚠️  DO NOT commit this file with real values!
#
# Usage:
#   1. Copy this file: cp k8s/secrets.yaml k8s/secrets-custom.yaml
#   2. Replace all placeholder base64 values with real ones
#   3. Apply: kubectl apply -f k8s/secrets-custom.yaml -n flowsync
#
# Or use sealed-secrets / external-secrets / Vault for production.
#
# Generate base64 values:
#   echo -n 'your-secret' | base64
#   echo -n 'sk-proj-abc123...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: flowsync-secrets
  namespace: flowsync
  labels:
    app.kubernetes.io/name: flowsync
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # ── Database Password ──
  # echo -n 'flowsync_secret' | base64
  DB_PASSWORD: Zmxvd3N5bmNfc2VjcmV0

  # ── OpenAI API Key ──
  # echo -n 'sk-proj-your-key-here' | base64
  OPENAI_API_KEY: c2stcHJveS1wbGFjZWhvbGRlci1rZXk

  # ── Kafka SASL (if using managed Kafka) ──
  # Leave empty for local/plain Kafka
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""

  # ── JWT Secret (for future auth) ──
  # openssl rand -base64 32 | head -c 32 | base64
  JWT_SECRET: cGxhY2Vob2xkZXItand0LXNlY3JldC1rZXk

---
# Alternative: Use kubectl create secret (recommended for manual setup)
#
# kubectl create secret generic flowsync-secrets \
#   --from-literal=DB_PASSWORD='flowsync_secret' \
#   --from-literal=OPENAI_API_KEY='sk-proj-your-key-here' \
#   --from-literal=JWT_SECRET='your-jwt-secret' \
#   -n flowsync

# FlowSync Customer Success AI Agent -- Kafka (Strimzi)
# =======================================================
# DEPRECATED: Using in-cluster Kafka via Strimzi operator.
#
# RECOMMENDED FOR PRODUCTION:
#   - AWS: MSK (Managed Streaming for Kafka)
#   - GCP: Confluent Cloud on GCP
#   - Azure: Event Hubs (Kafka-compatible) or Confluent Cloud
#   - Any: Confluent Cloud (multi-cloud)
#
# If you MUST run Kafka in-cluster, use Strimzi:
#   1. Install Strimzi operator:
#      kubectl create namespace kafka
#      kubectl create -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka
#
#   2. Apply this manifest:
#      kubectl apply -f k8s/kafka.yaml -n flowsync
#
#   3. Create a KafkaTopic for each topic:
#      See below for topic definitions.
#
# Note: Running Kafka in-cluster requires significant resources
# (ZooKeeper + 3+ brokers for production). Consider managed Kafka
# to reduce operational overhead.

---
